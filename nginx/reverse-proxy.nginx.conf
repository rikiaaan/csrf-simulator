upstream front_general {
    server front_general:80;
}

upstream backend {
    server backend:80;
}

upstream front_evil {
    server front_evil:80;
}

server {
    listen 443 ssl;

    server_tokens off;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    ssl_certificate /data/server.crt;
    ssl_certificate_key /data/server.key;

    server_name general.csrf-s.internal;

    location / {
        proxy_pass http://front_general;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

server {
    listen 443 ssl;

    server_tokens off;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    ssl_certificate /data/server.crt;
    ssl_certificate_key /data/server.key;

    server_name evil.csrf-s.internal;

    location / {
        proxy_pass http://front_evil;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
